    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 全局基础 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #00adb5;
            --secondary-color: #393e46;
            --background-color: #222831;
            --text-color: #eeeeee;
            --accent-color: #ff5722;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.5;
            overflow-x: hidden;
            word-wrap: break-word;
            overflow-wrap: break-word;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0 clamp(6px, 1.5vw, 12px);
        }

        a {
            color: var(--primary-color);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        a:hover {
            color: var(--accent-color);
        }

        /* ========== 顶部头部（核心修复遮挡问题） ========== */
        .slider-container {
            width: 100%;
            /* 取消固定高度，改为自适应内容高度 */
            height: auto;
            overflow: hidden;
            margin-bottom: clamp(12px, 3vw, 24px);
            position: relative;
        }

        .slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            /* 背景图顶部对齐，人物不会被裁 */
            background-position: center top;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        /* 内容层：从上往下排布，不再垂直居中挤压底部文字 */
        .slider-overlay {
            position: relative;
            width: 100%;
            background: rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            /* 上下超大内边距，底部文字完全留出空间，杜绝遮挡 */
            padding: clamp(20px, 5vw, 30px) clamp(10px, 2vw, 20px) clamp(40px, 10vw, 60px);
            z-index: 5;
        }

        .profile-header {
            text-align: center;
            width: 100%;
            animation: fadeIn 1.5s ease-out;
            z-index: 10;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 头像自适应，完整圆形不裁切 */
        .avatar {
            width: clamp(65px, 18vw, 110px);
            height: clamp(65px, 18vw, 110px);
            border-radius: 50%;
            border: clamp(2px, 0.4vw, 3px) solid var(--primary-color);
            object-fit: cover;
            margin-bottom: clamp(6px, 1.5vw, 12px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: visible;
        }

        .avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        /* 文字动态缩放，超小屏自动缩小 */
        .profile-info h1 {
            font-size: clamp(1.2rem, 5vw, 2.2rem);
            margin-bottom: clamp(3px, 0.8vw, 8px);
            color: white;
        }

        .profile-info p {
            font-size: clamp(0.7rem, 3vw, 1rem);
            margin-bottom: clamp(3px, 0.8vw, 6px);
            line-height: 1.3;
            color: #eee;
        }

        .company {
            color: #ccc;
            padding: 0 clamp(2px, 0.5vw, 6px);
        }

        /* ========== 公众号区域（官网按钮固定在轮播上方） ========== */
        .wechat-section {
            position: relative;
            margin-bottom: clamp(16px, 4vw, 30px);
        }

        .top-link-btn {
            text-align: center;
            margin-bottom: clamp(8px, 2vw, 16px);
        }

        .company-link {
            display: inline-block;
            padding: clamp(5px, 1.8vw, 9px) clamp(10px, 2.5vw, 18px);
            background: var(--primary-color);
            color: #000;
            border-radius: 999px;
            font-size: clamp(0.7rem, 2.8vw, 0.9rem);
            max-width: 96%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 20;
            transition: all 0.3s ease;
        }

        .company-link:hover {
            transform: translateY(-2px);
            color: #000;
        }

        .wechat-slider-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: clamp(6px, 1.5vw, 12px);
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .wechat-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .wechat-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .wechat-slide.active {
            opacity: 1;
        }

        .wechat-slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.55);
            color: white;
            border: none;
            width: clamp(28px, 7vw, 42px);
            height: clamp(28px, 7vw, 42px);
            border-radius: 50%;
            font-size: clamp(0.75rem, 2.8vw, 1rem);
            cursor: pointer;
            z-index: 10;
            transition: background 0.3s ease;
        }

        .wechat-slider-btn:hover {
            background: var(--primary-color);
        }

        .prev-btn {
            left: clamp(3px, 0.8vw, 8px);
        }

        .next-btn {
            right: clamp(3px, 0.8vw, 8px);
        }

        .wechat-slider-dots {
            position: absolute;
            bottom: clamp(8px, 1.8vw, 14px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: clamp(4px, 1.2vw, 10px);
            z-index: 10;
        }

        .dot {
            width: clamp(6px, 1.8vw, 12px);
            height: clamp(6px, 1.8vw, 12px);
            border-radius: 50%;
            background: rgba(255, 255, 0.5);
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .dot.active {
            background: var(--primary-color);
        }

        /* 板块标题 */
        .section-title {
            text-align: center;
            margin: clamp(16px, 4vw, 30px) 0 clamp(8px, 1.8vw, 16px);
            font-size: clamp(1.1rem, 4.8vw, 1.8rem);
            position: relative;
            color: white;
        }

        .section-title::after {
            content: '';
            display: block;
            width: clamp(40px, 10vw, 70px);
            height: 3px;
            background: var(--primary-color);
            margin: clamp(4px, 1vw, 10px) auto 0;
            border-radius: 3px;
        }

        .follow-button {
            text-align: center;
            margin-top: clamp(12px, 3vw, 22px);
            margin-bottom: clamp(6px, 1.5vw, 10px);
        }

        .follow-button a {
            display: inline-block;
            padding: clamp(7px, 2.2vw, 12px) clamp(16px, 5vw, 26px);
            background: #07c160;
            color: white;
            border-radius: 999px;
            font-weight: bold;
            font-size: clamp(0.78rem, 3vw, 1rem);
        }

        .follow-button a:hover {
            background: #06ad56;
            transform: scale(1.03);
        }

        /* 社交图标自动换行 */
        .social-icons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: clamp(8px, 2.5vw, 18px);
            margin: clamp(16px, 4vw, 28px) 0;
            align-items: center;
            padding: 0 clamp(6px, 1.5vw, 10px);
        }

        .social-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: clamp(40px, 11vw, 62px);
            height: clamp(40px, 11vw, 62px);
            border-radius: 50%;
            background: var(--secondary-color);
            color: white;
            font-size: clamp(0.9rem, 3.5vw, 1.4rem);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
            flex-shrink: 0;
        }

        .social-icon::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--primary-color);
            transform: scale(0);
            transition: transform 0.3s ease;
            z-index: 1;
        }

        .social-icon:hover::before {
            transform: scale(1);
        }

        .social-icon:hover i {
            transform: rotateY(360deg);
            color: white;
        }

        .social-icon i {
            position: relative;
            z-index: 2;
            transition: transform 0.6s ease;
        }

        .more-platform-link {
            display: inline-block;
            padding: clamp(6px, 1.8vw, 9px) clamp(10px, 2.5vw, 16px);
            background: var(--secondary-color);
            color: var(--text-color);
            border-radius: 999px;
            font-size: clamp(0.68rem, 2.5vw, 0.85rem);
            transition: all 0.3s ease;
            z-index: 10;
            position: relative;
            margin-top: clamp(4px, 1.2vw, 10px);
        }

        .more-platform-link:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-2px);
        }

        /* 页脚 */
        .footer {
            background: #1a1a1a;
            padding: clamp(20px, 5vw, 32px) 0 clamp(10px, 2.5vw, 16px);
            margin-top: clamp(24px, 6vw, 40px);
        }

        .footer-content {
            display: flex;
            flex-wrap: wrap;
            flex-direction: column;
            gap: clamp(12px, 3vw, 20px);
            align-items: center;
            text-align: center;
        }

        .friend-links {
            min-width: unset;
            width: 100%;
        }

        .friend-links h3 {
            color: white;
            margin-bottom: clamp(6px, 1.5vw, 12px);
            font-size: clamp(0.88rem, 3.5vw, 1.2rem);
        }

        .friend-links ul {
            list-style: none;
        }

        .friend-links li {
            margin-bottom: clamp(4px, 1.2vw, 8px);
        }

        .friend-links a {
            color: #aaa;
            position: relative;
            padding-left: clamp(8px, 2vw, 14px);
            font-size: clamp(0.75rem, 2.8vw, 0.95rem);
        }

        .friend-links a::before {
            content: '•';
            position: absolute;
            left: 0;
            color: var(--primary-color);
        }

        .friend-links a:hover {
            color: white;
            padding-left: clamp(10px, 2.5vw, 18px);
        }

        .copyright {
            width: 100%;
            color: #aaa;
            font-size: clamp(0.7rem, 2.5vw, 0.88rem);
            text-align: center;
        }

        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.85);
            animation: modalFadeIn 0.3s ease-out;
            padding: clamp(8px, 2vw, 15px);
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--background-color);
            padding: clamp(14px, 3.5vw, 24px) clamp(10px, 2.5vw, 16px);
            border-radius: clamp(6px, 1.5vw, 12px);
            text-align: center;
            max-width: min(320px, 92vw);
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .close-modal {
            position: absolute;
            top: clamp(6px, 1.5vw, 10px);
            right: clamp(8px, 2vw, 14px);
            font-size: clamp(18px, 4.5vw, 26px);
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-modal:hover {
            color: white;
        }

        #qr-code-image {
            width: min(170px, 60vw);
            height: auto;
            margin: clamp(12px, 3vw, 18px) 0;
            border: clamp(2px, 0.6vw, 4px) solid white;
        }

        /* 波纹动画 */
        .hover-effect {
            position: relative;
            overflow: hidden;
        }

        .hover-effect::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 0.5);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%, -50%);
            transform-origin: 50% 50%;
        }

        .hover-effect:focus:not(:active)::after {
            animation: ripple 1s ease-out;
        }

        @keyframes ripple {
            0% {
                transform: scale(0, 0);
                opacity: 0.5;
            }
            100% {
                transform: scale(20, 20);
                opacity: 0;
            }
        }

        /* ========== 524px及以下窄屏专项适配 ========== */
        @media (max-width: 524px) {
            /* 头部底部内边距再加大，文字完全不被遮挡 */
            .slider-overlay {
                padding-bottom: 50px;
            }
            .wechat-slider-btn {
                width: 26px;
                height: 26px;
            }
            .profile-info p {
                line-height: 1.25;
            }
            .social-icons {
                gap: 6px;
            }
        }

        /* 矮屏兜底（高度≤857px） */
        @media (max-height: 857px) {
            .slider-overlay {
                padding-top: 15px;
                padding-bottom: 45px;
            }
        }
    </style>
</head>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        document.addEventListener('DOMContentLoaded', function() {
            // 顶部轮播
            const slides = document.querySelectorAll('.slide');
            let currentSlide = 0;
            function showSlide(n) {
                slides.forEach(slide => slide.classList.remove('active'));
                currentSlide = (n + slides.length) % slides.length;
                slides[currentSlide].classList.add('active');
            }
            function nextSlide() { showSlide(currentSlide + 1); }
            let slideInterval = setInterval(nextSlide, 5000);
            const slider = document.querySelector('.slider');
            slider.addEventListener('mouseenter', () => clearInterval(slideInterval));
            slider.addEventListener('mouseleave', () => {
                clearInterval(slideInterval);
                slideInterval = setInterval(nextSlide, 5000);
            });
            if (slides.length) showSlide(0);

            // 公众号轮播
            const wechatSlides = document.querySelectorAll('.wechat-slide');
            const prevBtn = document.querySelector('.prev-btn');
            const nextBtn = document.querySelector('.next-btn');
            const dots = document.querySelectorAll('.dot');
            let currentWechatSlide = 0;
            function showWechatSlide(n) {
                wechatSlides.forEach(s => s.classList.remove('active'));
                dots.forEach(d => d.classList.remove('active'));
                currentWechatSlide = (n + wechatSlides.length) % wechatSlides.length;
                wechatSlides[currentWechatSlide].classList.add('active');
                dots[currentWechatSlide].classList.add('active');
            }
            function nextWechatSlide() { showWechatSlide(currentWechatSlide + 1); }
            function prevWechatSlide() { showWechatSlide(currentWechatSlide - 1); }

            let wechatInterval = setInterval(nextWechatSlide, 5000);
            prevBtn.onclick = () => { clearInterval(wechatInterval); prevWechatSlide(); wechatInterval = setInterval(nextWechatSlide,5000); };
            nextBtn.onclick = () => { clearInterval(wechatInterval); nextWechatSlide(); wechatInterval = setInterval(nextWechatSlide,5000); };
            dots.forEach(dot => {
                dot.onclick = () => {
                    clearInterval(wechatInterval);
                    showWechatSlide(Number(dot.dataset.index));
                    wechatInterval = setInterval(nextWechatSlide,5000);
                }
            });
            const wechatWrap = document.querySelector('.wechat-slider-container');
            wechatWrap.addEventListener('mouseenter', ()=>clearInterval(wechatInterval));
            wechatWrap.addEventListener('mouseleave', ()=>{
                clearInterval(wechatInterval);
                wechatInterval = setInterval(nextWechatSlide,5000);
            });
            if(wechatSlides.length) showWechatSlide(0);

            // 二维码弹窗
            const socialIcons = document.querySelectorAll('.social-icon');
            const modal = document.getElementById('qr-modal');
            const modalImg = document.getElementById('qr-code-image');
            const platName = document.getElementById('platform-name');
            const closeModal = document.querySelector('.close-modal');
            const nameMap = { weixin: '微信', weibo: '微博' };

            socialIcons.forEach(icon => {
                icon.addEventListener('click', function(e) {
                    e.preventDefault();
                    const link = this.getAttribute('href');
                    const plat = this.dataset.platform;
                    const qrSrc = this.dataset.qr;
                    if (!plat || !qrSrc) {
                        if(link.startsWith('mailto')) window.location.href = link;
                        else window.open(link, '_blank');
                        return;
                    }
                    modalImg.src = qrSrc;
                    platName.innerText = nameMap[plat] || plat;
                    modal.style.display = 'block';
                })
            });
            closeModal.onclick = () => modal.style.display = 'none';
            window.onclick = (e) => {
                if(e.target === modal) modal.style.display = 'none';
            }
        })
    </script>
</body>
</html>
